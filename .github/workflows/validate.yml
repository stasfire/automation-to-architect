name: Validate Tests & Update Progress

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all test files
        run: node scripts/run-tests.js --check

      - name: Update progress badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          node scripts/update-progress.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update progress badge"
          git push
